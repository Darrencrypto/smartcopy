<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XT 聪明钱带单员 — 后台原型</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#333;min-height:100vh;padding:40px 24px}
.container{max-width:640px;margin:0 auto}
h1{font-size:20px;font-weight:700;color:#303133;margin-bottom:6px}
.subtitle{color:#909399;font-size:13px;margin-bottom:32px}
.grid{display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border:1px solid #ebeef5;border-radius:4px;padding:20px;text-decoration:none;color:#303133;transition:all .2s;display:block}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:#409eff}
.card h2{font-size:14px;font-weight:600;margin-bottom:6px}
.card p{color:#909399;font-size:12px;line-height:1.5}
.tag{display:inline-block;background:#ecf5ff;color:#409eff;font-size:11px;padding:2px 8px;border-radius:3px;border:1px solid #d9ecff;margin-top:10px}

</head>
<body>
<div class="container">
<h1>聪明钱带单员 — 后台原型</h1>
<p class="subtitle">XT 合约跟单 · 聪明钱管理后台</p>

<div class="grid">
  <a href="admin-wallet-list.html" class="card">
    <h2>1. 聪明钱带单员列表</h2>
    <p>钱包池管理：XT UID / 钱包地址 / 评分 / 风险等级 / 总资产 / 状态 / 显示 + 手动添加钱包</p>
    <span class="tag">列表页</span>
  </a>

  <a href="admin-signal-log.html" class="card">
    <h2>2. 聪明钱信号日志</h2>
    <p>信号生成和执行记录：信号类型 / 合约 / 状态 / 延迟 / 触发跟单数，可展开查看跟单订单详情</p>
    <span class="tag">日志页</span>
  </a>

  <a href="admin-config.html" class="card">
    <h2>3. 聪明钱全局配置</h2>
    <p>功能开关 / 入池条件 / 跟单限制 / 风控阈值 / 系统参数，共 13 项可配置</p>
    <span class="tag">配置页</span>
  </a>
</div>
</div>

</html>
