<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XT 合约跟单 — 聪明钱带单员</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--xt-primary:#BAFF00;--xt-bg:#000;--xt-surface:#121212;--xt-surface2:#1A1A1A;--xt-border:#2B3139;--xt-text:#FFF;--xt-text2:#848E9C;--xt-green:#2EBD85;--xt-red:#D94D5B;--radius-card:14px}
body{font-family:'Inter','Roboto',-apple-system,sans-serif;background:var(--xt-bg);color:var(--xt-text);max-width:1200px;margin:0 auto;-webkit-font-smoothing:antialiased}

/* Top Nav */
.topnav{display:flex;align-items:center;padding:12px 16px;gap:12px;border-bottom:1px solid var(--xt-border);position:sticky;top:0;background:var(--xt-bg);z-index:100}
.topnav .logo{width:28px;height:28px;background:var(--xt-primary);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#000}
.topnav .nav-items{display:flex;gap:20px;font-size:14px;color:var(--xt-text2)}
.topnav .nav-items span:hover{color:var(--xt-text);cursor:pointer}
.topnav .nav-items .active{color:var(--xt-text);font-weight:600}

/* Hero */
.hero{padding:32px 16px 24px;background:linear-gradient(135deg,#0a0a0a 0%,#111 50%,#0a1200 100%)}
.hero h1{font-size:28px;font-weight:700;margin-bottom:8px}
.hero p{color:var(--xt-text2);font-size:14px;margin-bottom:16px;max-width:480px}
.hero-links{display:flex;gap:16px;font-size:13px}
.hero-links a{color:var(--xt-primary);text-decoration:none;display:flex;align-items:center;gap:4px}

/* Sub Tabs */
.sub-tabs{display:flex;align-items:center;padding:0 16px;border-bottom:1px solid var(--xt-border);position:sticky;top:53px;background:var(--xt-bg);z-index:99}
.sub-tab{padding:14px 0;margin-right:24px;font-size:14px;color:var(--xt-text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.sub-tab:hover{color:var(--xt-text)}
.sub-tab.active{color:var(--xt-text);font-weight:600;border-bottom-color:var(--xt-primary)}
.sub-tabs .right{margin-left:auto;display:flex;align-items:center;gap:16px;font-size:13px;color:var(--xt-text2)}
.sub-tabs .right span{cursor:pointer}
.sub-tabs .right span:hover{color:var(--xt-text)}

/* Content */
.content{padding:0 16px 80px}

/* Section */
.section{margin-top:28px}
.section-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.section-title{font-size:18px;font-weight:700}
.section-sub{font-size:12px;color:var(--xt-text2);margin-bottom:16px}
.section-more{font-size:13px;color:var(--xt-text2);cursor:pointer;text-decoration:none}
.section-more:hover{color:var(--xt-primary)}

/* Card Grid */
.card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:900px){.card-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.card-grid{grid-template-columns:1fr}}

/* Trader Card */
.trader-card{background:var(--xt-surface);border:1px solid var(--xt-border);border-radius:var(--radius-card);padding:16px;cursor:pointer;transition:all .2s;position:relative}
.trader-card:hover{border-color:var(--xt-primary);transform:translateY(-1px)}
.trader-card:active{transform:scale(.985)}

.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-identity{display:flex;align-items:center;gap:10px}
.jazzicon{width:40px;height:40px;border-radius:50%;background:conic-gradient(from 45deg,#6366f1,#06b6d4,#BAFF00,#f59e0b,#6366f1);flex-shrink:0}
.card-name{font-size:13px;font-weight:600;margin-bottom:2px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-meta{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--xt-text2)}
.risk-badge{padding:1px 6px;border-radius:4px;font-weight:600;font-size:10px}
.risk-badge.low{background:rgba(46,189,133,.12);color:#2EBD85}
.risk-badge.moderate{background:rgba(240,185,11,.12);color:#F0B90B}
.risk-badge.high{background:rgba(217,77,91,.12);color:#D94D5B}
.risk-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.risk-low{background:#2EBD85}
.risk-moderate{background:#F0B90B}
.risk-high{background:#D94D5B}
.followers{font-size:11px;color:var(--xt-text2)}

.btn-copy{background:var(--xt-primary);color:#000;border:none;border-radius:50px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-copy:hover{filter:brightness(1.1)}
.btn-copy:active{transform:scale(.95)}

/* Stats */
.card-stats{margin-bottom:12px}
.stat-label{font-size:11px;color:var(--xt-text2);margin-bottom:2px}
.stat-value{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-value.green{color:var(--xt-green)}
.stat-value.primary{color:var(--xt-primary)}

.card-row{display:flex;justify-content:space-between;font-size:12px;color:var(--xt-text2);margin-bottom:4px}
.card-row .val{color:var(--xt-text);font-variant-numeric:tabular-nums}
.card-row .val.green{color:var(--xt-green)}

/* Sparkline */
.sparkline{height:40px;margin:8px 0;position:relative;overflow:hidden}
.sparkline svg{width:100%;height:100%}

.card-bottom{display:flex;justify-content:space-between;padding-top:10px;border-top:1px solid var(--xt-border);font-size:11px;color:var(--xt-text2)}

/* Tags */
.tag-row{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(132,142,156,.1);color:var(--xt-text2)}
.tag.highlight{background:rgba(186,255,0,.08);color:var(--xt-primary)}
.tag.source{background:rgba(255,255,255,.08);color:var(--xt-text);font-weight:500}
.tag.pair{background:rgba(46,189,133,.08);color:var(--xt-green)}
</style>
</head>
<body>

<!-- Top Nav -->
<div class="topnav">
  <div class="logo">XT</div>
  <div class="nav-items">
    <span>买币</span><span>行情</span><span>交易</span><span class="active">合约</span><span>工具</span><span>金融</span>
  </div>
</div>

<!-- Hero -->
<div class="hero">
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:6px">
    <div style="display:flex;gap:12px">
      <span style="font-size:15px;font-weight:600;color:var(--xt-text);cursor:pointer;border-bottom:2px solid var(--xt-primary);padding-bottom:8px">合约</span>
      <span style="font-size:15px;color:var(--xt-text2);cursor:pointer;padding-bottom:8px">现货</span>
    </div>
  </div>
  <h1>合约跟单</h1>
  <p>像专业人士一样投资，一键复制顶级带单员的实时交易。</p>
  <div class="hero-links">
    <a href="#">申请成为带单员 →</a>
    <span style="color:var(--xt-border)">|</span>
    <a href="#">推荐跟单有奖 🎁</a>
  </div>
</div>

<!-- Sub Tabs -->
<div class="sub-tabs">
  <div class="sub-tab" onclick="switchTab(0)">精英带单员</div>
  <div class="sub-tab active" onclick="switchTab(1)">聪明钱带单员</div>
  <div class="sub-tab" onclick="switchTab(2)">全部带单员</div>
  <div class="right">
    <span>📋 我的跟单</span>
    <span>🔍 搜索带单员</span>
  </div>
</div>

<!-- Content: Smart Money Tab -->
<div class="content" id="smartMoneyContent">

  <!-- Section 1: 追求收益 -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">追求收益</span>
      <a class="section-more" href="#">更多 ></a>
    </div>
    <div class="section-sub">近30天收益率最高的聪明钱带单员</div>
    <div class="card-grid" id="profitCards"></div>
  </div>

  <!-- Section 2: 稳健交易 -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">稳健交易</span>
      <a class="section-more" href="#">更多 ></a>
    </div>
    <div class="section-sub">近90天收益率高且回撤率低的聪明钱带单员</div>
    <div class="card-grid" id="steadyCards"></div>
  </div>

  <!-- Section 3: 巨鲸动向 -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">巨鲸动向</span>
      <a class="section-more" href="#">更多 ></a>
    </div>
    <div class="section-sub">AUM 最大且近期活跃的聪明钱带单员</div>
    <div class="card-grid" id="whaleCards"></div>
  </div>

</div>

<script>
// Mock data
const profitData = [
  {addr:'0xbf73...5d58',risk:'low',roi:'+674.24%',pnl:'+$50,462',winRate:'100.00%',days:156,aum:'$57.9K',followers:'3/100',tags:['Hyperliquid','BTC主力','趋势','多头偏向']},
  {addr:'0x7dac...f410',risk:'low',roi:'+342.19%',pnl:'+$15.4M',winRate:'100.00%',days:312,aum:'$9.1M',followers:'0/100',tags:['Hyperliquid','多币种','巨鲸','趋势']},
  {addr:'0x8e09...0c9',risk:'low',roi:'+177.48%',pnl:'+$1.94M',winRate:'87.50%',days:245,aum:'$2M',followers:'4/100',tags:['Hyperliquid','BTC主力','趋势','中长线']},
];
const steadyData = [
  {addr:'0x418a...8888',risk:'low',roi90:'+42.16%',drawdown:'8.13%',winRate90:'93.33%',days:380,aum:'$5.7M',followers:'10/100',tags:['Hyperliquid','多币种','稳健','多空均衡']},
  {addr:'0x8cc9...2b6a',risk:'moderate',roi90:'+28.55%',drawdown:'15.59%',winRate90:'77.61%',days:210,aum:'$6.8M',followers:'0/100',tags:['Hyperliquid','ETH主力','趋势','巨鲸']},
  {addr:'0x4aab...7d64',risk:'moderate',roi90:'+19.82%',drawdown:'12.40%',winRate90:'75.00%',days:165,aum:'$3.4M',followers:'0/100',tags:['Hyperliquid','BTC主力','短线','多头偏向']},
];
const whaleData = [
  {addr:'0xb0a5...9540',risk:'moderate',aum:'$30M',trades7d:12,roi:'+0.00%',risk_label:'MODERATE',followers:'0/100',tags:['Hyperliquid','多币种','巨鲸']},
  {addr:'0x35d1...acb1',risk:'low',aum:'$19.3M',trades7d:8,roi:'+1.09%',risk_label:'LOW',followers:'0/100',tags:['Hyperliquid','BTC主力','巨鲸','稳健']},
  {addr:'0x45d2...4029',risk:'moderate',aum:'$15.8M',trades7d:15,roi:'-9.72%',risk_label:'MODERATE',followers:'0/100',tags:['Hyperliquid','ETH主力','巨鲸','空头偏向']},
];

function sparklineSVG(color){
  const pts=[];for(let i=0;i<20;i++){pts.push(Math.random()*30+5)}
  // Trending up for green
  if(color==='#2EBD85'||color==='#BAFF00'){for(let i=0;i<20;i++)pts[i]+=i*1.2}
  const max=Math.max(...pts),min=Math.min(...pts);
  const norm=pts.map((v,i)=>[i/(pts.length-1)*100,(1-(v-min)/(max-min||1))*100]);
  const d='M'+norm.map(p=>p[0]+','+p[1]).join(' L');
  return `<svg viewBox="0 0 100 100" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/></svg>`;
}

function renderProfitCards(){
  const c=document.getElementById('profitCards');
  c.innerHTML=profitData.map(d=>`
    <div class="trader-card" onclick="location.href='smart-money-detail.html'">
      <div class="card-top">
        <div class="card-identity">
          <div class="jazzicon" style="background:conic-gradient(from ${Math.random()*360}deg,#6366f1,#06b6d4,#BAFF00,#f59e0b,#6366f1)"></div>
          <div>
            <div class="card-name">${d.addr}</div>
            <div class="card-meta">
              <span class="risk-badge ${d.risk}">${d.risk==='low'?'🟢 低风险':d.risk==='moderate'?'🟡 中风险':'🔴 高风险'}</span>
              <span>${d.followers}</span>
            </div>
          </div>
        </div>
        <button class="btn-copy" onclick="event.stopPropagation();location.href='copy-settings.html'">跟单</button>
      </div>
      <div class="card-stats">
        <div class="stat-label">近30天收益率</div>
        <div class="stat-value primary">${d.roi}</div>
      </div>
      <div class="sparkline">${sparklineSVG('#BAFF00')}</div>
      <div class="card-row"><span>近30天收益</span><span class="val green">${d.pnl}</span></div>
      <div class="card-row"><span>近30天胜率</span><span class="val">${d.winRate}</span></div>
      <div class="card-bottom">
        <span>活跃天数 ${d.days}</span>
        <span>AUM ${d.aum}</span>
      </div>
      <div class="tag-row">${d.tags.map(t=>{const cls=t==='Hyperliquid'?'source':t.includes('主力')||t==='多币种'?'pair':'highlight';return `<span class="tag ${cls}">${t}</span>`}).join('')}</div>
    </div>
  `).join('');
}

function renderSteadyCards(){
  const c=document.getElementById('steadyCards');
  c.innerHTML=steadyData.map(d=>`
    <div class="trader-card" onclick="location.href='smart-money-detail.html'">
      <div class="card-top">
        <div class="card-identity">
          <div class="jazzicon" style="background:conic-gradient(from ${Math.random()*360}deg,#8b5cf6,#2EBD85,#06b6d4,#BAFF00,#8b5cf6)"></div>
          <div>
            <div class="card-name">${d.addr}</div>
            <div class="card-meta">
              <span class="risk-badge ${d.risk}">${d.risk==='low'?'🟢 低风险':d.risk==='moderate'?'🟡 中风险':'🔴 高风险'}</span>
              <span>${d.followers}</span>
            </div>
          </div>
        </div>
        <button class="btn-copy" onclick="event.stopPropagation();location.href='copy-settings.html'">跟单</button>
      </div>
      <div class="card-stats">
        <div class="stat-label">近90天收益率</div>
        <div class="stat-value green">${d.roi90}</div>
      </div>
      <div class="sparkline">${sparklineSVG('#2EBD85')}</div>
      <div class="card-row"><span>近90天回撤</span><span class="val">${d.drawdown}</span></div>
      <div class="card-row"><span>近90天胜率</span><span class="val">${d.winRate90}</span></div>
      <div class="card-bottom">
        <span>活跃天数 ${d.days}</span>
        <span>AUM ${d.aum}</span>
      </div>
      <div class="tag-row">${d.tags.map(t=>{const cls=t==='Hyperliquid'?'source':t.includes('主力')||t==='多币种'?'pair':'highlight';return `<span class="tag ${cls}">${t}</span>`}).join('')}</div>
    </div>
  `).join('');
}

function renderWhaleCards(){
  const c=document.getElementById('whaleCards');
  c.innerHTML=whaleData.map(d=>`
    <div class="trader-card" onclick="location.href='smart-money-detail.html'">
      <div class="card-top">
        <div class="card-identity">
          <div class="jazzicon" style="background:conic-gradient(from ${Math.random()*360}deg,#f59e0b,#ef4444,#8b5cf6,#06b6d4,#f59e0b)"></div>
          <div>
            <div class="card-name">${d.addr}</div>
            <div class="card-meta">
              <span class="risk-badge ${d.risk}">${d.risk==='low'?'🟢 低风险':d.risk==='moderate'?'🟡 中风险':'🔴 高风险'}</span>
              <span>${d.followers}</span>
            </div>
          </div>
        </div>
        <button class="btn-copy" onclick="event.stopPropagation();location.href='copy-settings.html'">跟单</button>
      </div>
      <div class="card-stats">
        <div class="stat-label">AUM</div>
        <div class="stat-value" style="color:var(--xt-text)">${d.aum}</div>
      </div>
      <div class="card-row"><span>近7天交易次数</span><span class="val">${d.trades7d}</span></div>
      <div class="card-row"><span>近30天收益率</span><span class="val ${d.roi.startsWith('+')?'green':''}" style="${d.roi.startsWith('-')?'color:var(--xt-red)':''}">${d.roi}</span></div>
      <div class="card-row"><span>风险等级</span><span class="val">${d.risk_label}</span></div>
      <div class="card-bottom">
        <span>跟单 ${d.followers}</span>
        <span style="color:var(--xt-primary);cursor:pointer">链上验证 ↗</span>
      </div>
      <div class="tag-row">${d.tags.map(t=>{const cls=t==='Hyperliquid'?'source':t.includes('主力')||t==='多币种'?'pair':'highlight';return `<span class="tag ${cls}">${t}</span>`}).join('')}</div>
    </div>
  `).join('');
}

function switchTab(idx){
  document.querySelectorAll('.sub-tab').forEach((t,i)=>{t.classList.toggle('active',i===idx)});
  document.getElementById('smartMoneyContent').style.display=idx===1?'block':'none';
  if(idx!==1){
    document.getElementById('smartMoneyContent').style.display='none';
    // Show a placeholder for other tabs
    let ph=document.getElementById('placeholder');
    if(!ph){ph=document.createElement('div');ph.id='placeholder';ph.style.cssText='padding:80px 16px;text-align:center;color:var(--xt-text2);font-size:14px';document.body.appendChild(ph)}
    ph.innerHTML=idx===0?'精英带单员内容（现有页面）':'全部带单员内容（现有页面）';
    ph.style.display='block';
  } else {
    let ph=document.getElementById('placeholder');
    if(ph)ph.style.display='none';
    document.getElementById('smartMoneyContent').style.display='block';
  }
}

renderProfitCards();
renderSteadyCards();
renderWhaleCards();
</script>
</body>
</html>
